name: Build & Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build e Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install && npm install --prefix client

      - name: Build frontend
        run: npm --prefix client run build

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "$FTP_USER,$FTP_PASS" \
            -e "set ftp:ssl-force true; \
                set ftp:ssl-allow true; \
                set ssl:verify-certificate false; \
                set ftp:passive-mode true; \
                set ftp:prefer-epsv false; \
                set xfer:use-temp-file false; \
                set net:timeout 60; \
                set net:max-retries 3; \
                set net:reconnect-interval-base 10; \
                mirror -R --no-perms --parallel=2 --exclude logo.png client/dist/ /public_html/; \
                quit" \
            ftp://$FTP_HOST:21
