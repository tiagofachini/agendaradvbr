name: Build & Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-functions:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "ERRO: secret SUPABASE_ACCESS_TOKEN não encontrado ou vazio."
            echo "Configure em: https://github.com/tiagofachini/agendaradvbr/settings/secrets/actions"
            exit 1
          fi
          P=nfgexlsfmyfypueslzxo

          deploy_fn() {
            local fn=$1
            local extra=${2:-}
            for attempt in 1 2 3; do
              supabase functions deploy "$fn" --project-ref $P $extra && return 0
              echo "Attempt $attempt failed for $fn, retrying in $((attempt * 10))s..."
              sleep $((attempt * 10))
            done
            echo "ERROR: failed to deploy $fn after 3 attempts"
            return 1
          }

          deploy_fn admin
          deploy_fn appointments
          deploy_fn clients
          deploy_fn dashboard
          deploy_fn finance
          deploy_fn google-calendar
          deploy_fn scheduler
          deploy_fn settings
          deploy_fn stripe-connect
          deploy_fn stripe-webhook "--no-verify-jwt"
          deploy_fn whatsapp

  deploy:
    name: Build e Deploy via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install && npm install --prefix client

      - name: Build frontend
        run: npm --prefix client run build

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python3 - <<'PYEOF'
          import ftplib, os, ssl, sys

          TIMEOUT     = 180  # segundos por operação de socket
          MAX_RETRIES = 3
          SKIP        = {'logo.png', '.htaccess'}

          def make_ftp():
              ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
              ctx.check_hostname = False
              ctx.verify_mode    = ssl.CERT_NONE
              ftp = ftplib.FTP_TLS(context=ctx, timeout=TIMEOUT)
              ftp.connect(os.environ['FTP_HOST'], 21, timeout=TIMEOUT)
              ftp.login(os.environ['FTP_USER'], os.environ['FTP_PASS'])
              ftp.set_pasv(True)
              ftp.prot_p()
              return ftp

          def upload_file(ftp, local_path, remote_path):
              for attempt in range(MAX_RETRIES):
                  try:
                      with open(local_path, 'rb') as f:
                          ftp.storbinary(f'STOR {remote_path}', f, blocksize=65536)
                      return ftp
                  except Exception as e:
                      if attempt < MAX_RETRIES - 1:
                          print(f'  retry ({attempt+2}/{MAX_RETRIES}) {remote_path}: {e}', flush=True)
                          try:
                              ftp = make_ftp()
                          except Exception:
                              pass
                      else:
                          raise
              return ftp

          def upload(ftp, local_dir, remote_dir):
              for item in sorted(os.listdir(local_dir)):
                  if item in SKIP:
                      print(f'  skip {item}', flush=True)
                      continue
                  local_path  = os.path.join(local_dir, item)
                  remote_path = f'{remote_dir}/{item}'
                  if os.path.isfile(local_path):
                      try:
                          ftp = upload_file(ftp, local_path, remote_path)
                          print(f'  ok   {remote_path}', flush=True)
                      except Exception as e:
                          print(f'  FAIL {remote_path}: {e}', file=sys.stderr)
                          sys.exit(1)
                  elif os.path.isdir(local_path):
                      try:
                          ftp.mkd(remote_path)
                      except ftplib.error_perm:
                          pass  # directory already exists
                      ftp = upload(ftp, local_path, remote_path)
              return ftp

          ftp = make_ftp()
          upload(ftp, 'client/dist', '/public_html')
          ftp.quit()
          print('Deploy concluído!', flush=True)
          PYEOF
