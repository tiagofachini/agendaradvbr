name: Deploy → Hostinger

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install client dependencies
        run: npm install --prefix client

      - name: Install server dependencies
        run: npm install --prefix server

      - name: Build frontend
        run: npm run build --prefix client

      - name: Generate Prisma client
        run: cd server && npx prisma generate

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        if: ${{ secrets.HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.APP_PATH }}
            git pull origin main
            npm install
            npm install --prefix client
            npm install --prefix server
            npm run build --prefix client
            cd server && npx prisma generate && npx prisma migrate deploy && cd ..
            touch tmp/restart.txt 2>/dev/null || true

      - name: Deploy skipped
        if: ${{ secrets.HOST == '' }}
        run: echo "SSH secrets não configurados — deploy ignorado. Configure HOST, SSH_USER, SSH_PRIVATE_KEY, SSH_PORT e APP_PATH nos secrets do repositório."
