name: Deploy → Hostinger

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm install

      - name: Install client dependencies
        run: npm install --prefix client

      - name: Install server dependencies
        run: npm install --prefix server

      - name: Build frontend
        run: npm --prefix client run build

      - name: Generate Prisma client
        run: cd server && npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost/placeholder' }}
          DIRECT_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost/placeholder' }}

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check SSH secrets
        id: check
        env:
          HOST: ${{ secrets.HOST }}
        run: |
          if [ -n "$HOST" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "SSH secrets não configurados — deploy ignorado."
          fi

      - name: Deploy via SSH
        if: steps.check.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            . "$NVM_DIR/nvm.sh"
            cd ${{ secrets.APP_PATH }}
            git pull origin main
            npm install
            npm install --prefix client
            npm install --prefix server
            npm --prefix client run build
            cd server && npx prisma generate && npx prisma migrate deploy && cd ..
            touch tmp/restart.txt 2>/dev/null || true
